<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Restaurante Mariachi Grill</title>
</head>
<body>
    <main>
        <section id="sectionCadastro">
            <h1>CRIE SUA CONTA</h1>
            <form method="post">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Dandara De Quintela Perez" required>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="@dandaradequintela" required>
                <label for="numero">Número de Telefone:</label>
                <input type="tel" id="numero" name="numero" placeholder="(99) 99999-9999" required>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="qwe123!@#" required>
                <label for="confiraSenha">Confira sua senha:</label>
                <input type="password" id="confiraSenha" name="confiraSenha" placeholder="qwe123!@#" required>

                <button type="submit">Cadastrar</button>
            </form>

            <p><small>Já tem conta? <a href="./mariachigrill.html">Entrar</a></small></p>
        </section>
    </main>

    <footer class="indexFooter">
        <div class="footerLeft">
            <p><i>Mariachi Grill: A essência do México à sua mesa!</i></p>
            <p><small><i>© 2026 Mariachi Grill. Todos os direitos reservados.</i></small></p>
        </div>
        <div class="footerRight">
            
            <a href="https://www.instagram.com/nubiarinconp" target="_blank"> <!--Target blank -> abre outra ava no computador-->
                <img src="img/instagram.png" alt="Ícone do Instagram">
            </a>
            <a href="https://vsco.co/nubiarinconperezcardoso/gallery" target="_blank">
                <img src="img/vsco.png" alt="Ícone do Vsco">
            </a>
            <a href="https://www.tiktok.com/@nubiarinconp" target="_blank">
                <img src="img/tik-tok.png" alt="Ícone do TikTok">
            </a>
        </div>
    </footer>
</body>
</html>
