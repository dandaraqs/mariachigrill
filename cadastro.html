<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Restaurante Mariachi Grill</title>
</head>
<body>
    <main>
        <section id="sectionCadastro">
            <h1>CRIE SUA CONTA</h1>
            <form method="post">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Dandara De Quintela Perez" required>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="@dandaradequintela" required>
                <label for="numero">Número de Telefone:</label>
                <input type="tel" id="numero" name="numero" placeholder="(99) 99999-9999" required>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="qwe123!@#" required>
                <label for="confiraSenha">Confira sua senha:</label>
                <input type="password" id="confiraSenha" name="confiraSenha" placeholder="qwe123!@#" required>

                <button type="submit">Cadastrar</button>
            </form>

            <p><small>Já tem conta? <a href="./mariachigrill.html">Entrar</a></small></p>
        </section>
    </main>
</body>
</html>
